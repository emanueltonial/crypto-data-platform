name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --locked

      - name: Ruff Lint
        run: uv run ruff check .

  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest
    services:
      postgres:
        images: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: crypto_test
        ports:
          5432:5432
        options:  >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: crypto_test
      BINANCE_BASE_URL: https://api.binance.com/api/v3
      BINANCE_SYMBOLS: '["BTCUSDT", "SOLUSDT", "ETHUSDT"]'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --locked

      - name: Unit tests
        run: uv run pytest tests/unit

      - name: API tests
        run: uv run pytest tests/api

      - name: Service tests
        run: uv run pytest tests/service

  build:
    name: Build & Smoke Test
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env for CI
        run: |
          cat > .env << 'EOF'
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=postgres
          POSTGRES_DB=crypto_test
          POSTGRES_PORT=5432
          BINANCE_BASE_URL=https://api.binance.com/api/v3
          BINANCE_SYMBOLS: '["BTCUSDT", "SOLUSDT", "ETHUSDT"]'
          EOF

      - name: Build images
        run: docker compose build

      - name: Start stack (db -> migrate -> api)
        run: docker compose up -d --wait

      - name: Smoke test API health
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8000/health/; then
              echo "API healthy"
              exit 0
            fi
            sleep 2
          done
          echo "API did not become healthy in time"
          exit 1

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v
